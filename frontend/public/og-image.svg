<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#FAFAF8"/>
  <rect x="0" y="0" width="1200" height="8" fill="#2D5016"/>

  <!-- Logo area -->
  <rect x="80" y="80" width="48" height="48" rx="12" fill="#2D5016"/>
  <text x="104" y="114" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="bold">W</text>
  <text x="145" y="116" font-family="Arial, sans-serif" font-size="28" fill="#1A1A1A" font-weight="700">WaitUp</text>

  <!-- Main headline -->
  <text x="80" y="220" font-family="Georgia, serif" font-size="64" fill="#0F0F0F" font-weight="700" letter-spacing="2">Every no-show</text>
  <text x="80" y="300" font-family="Georgia, serif" font-size="64" fill="#0F0F0F" font-weight="700" letter-spacing="2">costs you</text>
  <text x="528" y="300" font-family="Georgia, serif" font-size="64" fill="#2D5016" font-weight="700" letter-spacing="2">R150.</text>

  <!-- Subtext -->
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="24" fill="#6B6B6B">Predict cancellations. Fill spots via WhatsApp. Stop churn.</text>

  <!-- CTA -->
  <rect x="80" y="420" width="280" height="56" rx="28" fill="#2D5016"/>
  <text x="220" y="457" font-family="Arial, sans-serif" font-size="18" fill="white" font-weight="600" text-anchor="middle">Start free, no card needed</text>

  <!-- Stats -->
  <rect x="80" y="520" width="160" height="70" rx="12" fill="#F4F8EF" stroke="#D4E4C8"/>
  <text x="160" y="552" font-family="Georgia, serif" font-size="28" fill="#2D5016" font-weight="700" text-anchor="middle">R21M+</text>
  <text x="160" y="574" font-family="Arial, sans-serif" font-size="12" fill="#6B6B6B" text-anchor="middle">recovered</text>

  <rect x="260" y="520" width="160" height="70" rx="12" fill="#F4F8EF" stroke="#D4E4C8"/>
  <text x="340" y="552" font-family="Georgia, serif" font-size="28" fill="#2D5016" font-weight="700" text-anchor="middle">94%</text>
  <text x="340" y="574" font-family="Arial, sans-serif" font-size="12" fill="#6B6B6B" text-anchor="middle">fill rate</text>

  <rect x="440" y="520" width="160" height="70" rx="12" fill="#F4F8EF" stroke="#D4E4C8"/>
  <text x="520" y="552" font-family="Georgia, serif" font-size="28" fill="#2D5016" font-weight="700" text-anchor="middle">&lt;8 min</text>
  <text x="520" y="574" font-family="Arial, sans-serif" font-size="12" fill="#6B6B6B" text-anchor="middle">avg fill time</text>

  <!-- SA flag hint -->
  <text x="1100" y="590" font-family="Arial, sans-serif" font-size="14" fill="#8A8A8A" text-anchor="end">🇿🇦 Built for SA studios</text>
</svg>
